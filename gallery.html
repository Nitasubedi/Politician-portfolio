<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery | Prakriti Dhakal</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/navbar.css" />
    <link rel="stylesheet" href="assets/css/aboutpage.css" />
    <link rel="stylesheet" href="assets/css/footer.css" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body>
    <div id="navbar"></div>

    <section class="page-banner">
      <div class="banner-overlay"></div>

      <div class="container">
        <div class="banner-content">
          <h1>Gallery</h1>

          <div class="breadcrumb">
            <a href="index.html">Home</a>

            <span>/</span>

            <span>Gallery</span>
          </div>
        </div>
      </div>
    </section>

    <section class="gallery-section">
      <div class="container">
        <div class="gallery-filter">
          <button class="filter-btn active" data-filter="all">All</button>

          <button class="filter-btn" data-filter="events">Events</button>

          <button class="filter-btn" data-filter="interviews">
            Interviews
          </button>

          <button class="filter-btn" data-filter="occasions">Occasions</button>
        </div>

        <div class="gallery-grid">
          <div class="gallery-item events">
            <img src="assets/images/gallery1.webp" alt="" />
          </div>

          <div class="gallery-item interviews">
            <img src="assets/images/gallery2.webp" alt="" />
          </div>

          <div class="gallery-item occasions">
            <img src="assets/images/gallery3.webp" alt="" />
          </div>

          <div class="gallery-item events">
            <img src="assets/images/gallery4.jpg" alt="" />
          </div>

          <div class="gallery-item interviews">
            <img src="assets/images/gallery4.jpg" alt="" />
          </div>

          <div class="gallery-item occasions">
            <img src="assets/images/news1.webp" alt="" />
          </div>

          <div class="gallery-item events">
            <img src="assets/images/news2.webp" alt="" />
          </div>

          <div class="gallery-item occasions">
            <img src="assets/images/news3.webp" alt="" />
          </div>
        </div>
      </div>
    </section>

    <!-- ================= Footer ================= -->

    <div id="footer"></div>

    <script src="assets/js/include.js"></script>
    <script src="assets/js/script.js"></script>
  </body>
  <style>
    /* Gallery */

    .gallery-section {
      padding: 60px 0;
    }

    .page-banner {
      position: relative;
      height: 420px;
      background: #0093da;
      margin-top: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .banner-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 35, 70, 0.5);
    }

    .banner-content {
      position: relative;
      z-index: 2;
      text-align: center;
      color: #fff;
    }

    .banner-content h1 {
      font-size: 60px;
      margin-bottom: 20px;
      font-weight: 800;
    }

    .breadcrumb {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .breadcrumb a {
      color: #fff;
      text-decoration: none;
    }

    .breadcrumb span {
      color: #fff;
    }

    .gallery-filter {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 60px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: none;
      border: none;
      font-size: 18px;
      font-weight: 400;
      cursor: pointer;
      padding: 10px 5px;
      position: relative;
      transition: 0.3s;
    }

    .filter-btn::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -3px;
      width: 0;
      height: 2px;
      background: #000;
      transition: 0.3s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      color: #000;
    }

    .filter-btn.active::after {
      width: 100%;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 25px;
    }

    .gallery-item {
      overflow: hidden;
      border-radius: 10px;
      transition: 0.4s;
    }

    .gallery-item img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
      transition: 0.5s;
    }

    .gallery-item:hover img {
      transform: scale(1.08);
    }

    /* Hidden Item */

    .gallery-item.hide {
      display: none;
    }

    /* Responsive */

    @media (max-width: 992px) {
      .gallery-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 768px) {
      .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 576px) {
      .gallery-grid {
        grid-template-columns: 1fr;
      }

      .gallery-filter {
        gap: 15px;
      }
    }
  </style>

  <script>
    const filterButtons = document.querySelectorAll(".filter-btn");
    const galleryItems = document.querySelectorAll(".gallery-item");

    filterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        // Active Button
        filterButtons.forEach((btn) => btn.classList.remove("active"));
        button.classList.add("active");

        const filter = button.getAttribute("data-filter");

        galleryItems.forEach((item) => {
          if (filter === "all") {
            item.classList.remove("hide");
          } else if (item.classList.contains(filter)) {
            item.classList.remove("hide");
          } else {
            item.classList.add("hide");
          }
        });
      });
    });
  </script>
</html>
