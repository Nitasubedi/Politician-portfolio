        </div>

        <div class="gallery-item events">

<style>
  /* Gallery */

  .gallery-section {
    padding: 70px 0;
  }

  .page-banner {
    position: relative;
    height: 420px;
    background: #0093da;
    margin-top: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .banner-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 35, 70, 0.5);
  }

  .banner-content {
    position: relative;
    z-index: 2;
    text-align: center;
    color: #fff;
  }

  .banner-content h1 {
    font-size: 60px;
    margin-bottom: 20px;
    font-weight: 800;
  }

  .breadcrumb {
    display: flex;
    justify-content: center;
    gap: 10px;
  }

  .breadcrumb a {
    color: #fff;
    text-decoration: none;
  }

  .breadcrumb span {
    color: #fff;
  }

  .gallery-filter {
    display: flex;
    justify-content: center;
    /* align-items: center; */
    gap: 18px;
    margin-bottom: 50px;
    border-bottom: 1px solid #ddd;
    padding-bottom: 20px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: none;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    padding: 10px 5px;
    position: relative;
    transition: 0.3s;
    padding: 12px 38px;
  }

  .filter-btn::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -3px;
    width: 0;
    height: 3px;
    background: #0093DA;
    transition: 0.3s;
  }

  .filter-btn:hover,
  .filter-btn.active {
    color: #0093DA;
  }

  .filter-btn.active::after {
    width: 100%;
  }

  .gallery-grid {
    column-count: 4;
    column-gap: 16px;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: 180px;

  }

  /* Cards */

  .gallery-item {
    position: relative;
    overflow: hidden;
    border-radius: 14px;
    transition: .35s;
    /* display: inline-block; */
    /* width: 100%; */
    margin-bottom: 16px;
    /* break-inside: avoid; */
  }

  /* Different heights */

  /* .gallery-item:nth-child(1) {
    height: 260px;
  }

  .gallery-item:nth-child(2) {
    height: 420px;
  }

  .gallery-item:nth-child(3) {
    height: 320px;
  }

  .gallery-item:nth-child(4) {
    height: 480px;
  }

  .gallery-item:nth-child(5) {
    height: 280px;
  }

  .gallery-item:nth-child(6) {
    height: 360px;
  }

  .gallery-item:nth-child(7) {
    height: 260px;
  }

  .gallery-item:nth-child(8) {
    height: 440px;
  }

  .gallery-item:nth-child(4n+1) {
    height: 260px;
  }

  .gallery-item:nth-child(4n+2) {
    height: 420px;
  }

  .gallery-item:nth-child(4n+3) {
    height: 320px;
  }

  .gallery-item:nth-child(4n+4) {
    height: 500px;
  } */

  .gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: 0.5s;
  }

  .gallery-item:hover img {
    transform: scale(1.08);
  }

  /* Hidden Item */

  .gallery-item.hide {
    display: none;
  }

  /* Feature Items */
  .large {
    grid-column: span 2;
    grid-row: span 2;
  }

  .tall {
    grid-row: span 2;
  }

  .wide {
    grid-column: span 2;
  }

  /* Responsive */

  @media (max-width: 992px) {
    .gallery-grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  @media (max-width: 768px) {
    .gallery-grid {
      grid-template-columns: repeat(2, 1fr);
      grid-auto-rows: 180px;

    }

    .large,
    .wide,
    .tall {
      grid-column: span 2;
      grid-row: span 1;
    }
  }

  @media (max-width: 576px) {
    .gallery-grid {
      display: grid;
      margin-bottom: 25px;
      grid-template-columns: 1fr;
      gap: 100px;
    }

    .gallery-grid {
      grid-template-columns: 1fr;
    }

    .gallery-filter {
      gap: 18px;
    }

    .gallery-item,
    .large,
    .wide,
    .tall {
      grid-column: span 1;
      grid-row: span 1;
      height: 260px;
    }
  }
</style>

<script>
  const filterButtons = document.querySelectorAll(".filter-btn");
  const galleryItems = document.querySelectorAll(".gallery-item");

  filterButtons.forEach((button) => {
    button.addEventListener("click", () => {
      // Active Button
      filterButtons.forEach((btn) => btn.classList.remove("active"));
      button.classList.add("active");

      const filter = button.getAttribute("data-filter");

      galleryItems.forEach((item) => {
        if (filter === "all") {
          item.classList.remove("hide");
        } else if (item.classList.contains(filter)) {
          item.classList.remove("hide");
        } else {
          item.classList.add("hide");
        }
      });
    });
  });
</script>

</html>
